<div class="auth-container">
    <h2>Account Registration</h2>
    <p class="subtitle">Please provide your credentials to request system access.</p>
    <hr>

    <form method="post">
        {% csrf_token %}
        
        <div class="form-fields">
            {{ form.as_p }}
        </div>

        <button type="submit" class="btn-primary">Register Account</button>
    </form>

    <div class="auth-footer">
        <p>Already possess credentials? <a href="{% url 'login' %}">Sign in here</a></p>
    </div>
</div>

<style>
    .auth-container {
        max-width: 450px;
        margin: 5% auto;
        padding: 30px;
        border: 1px solid #ddd;
        border-radius: 8px;
        font-family: 'Segoe UI', Tahoma, sans-serif;
        box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    .subtitle {
        color: #666;
        font-size: 0.9em;
    }
    .form-fields p {
        margin-bottom: 15px;
    }
    .auth-footer {
        margin-top: 25px;
        padding-top: 15px;
        border-top: 1px solid #eee;
        font-size: 0.85em;
        text-align: center;
    }
    .btn-primary {
        width: 100%;
        padding: 12px;
        background-color: #2c3e50; /* Formal dark blue/grey */
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-weight: bold;
    }
    .btn-primary:hover {
        background-color: #34495e;
    }
</style>
