<div class="auth-wrapper">
    <div class="auth-container">
        <div class="brand-section">
            <span class="badge">BLOCKCHAIN VERIFIED SECURITY</span>
            <h2 class="brand-title">MedXChAIn</h2>
            <div class="divider"></div>
        </div>

        <form method="post" class="auth-form">
            {% csrf_token %}
            
            {% if form.errors %}
                <p style="color: #d9534f; font-size: 0.85rem;">Please enter a correct username and password.</p>
            {% endif %}

            <div class="form-fields">
                {{ form.as_p }}
            </div>

            <button type="submit" class="btn-primary">Sign In to Dashboard</button>
        </form>

        <div class="auth-footer">
            <p>New to the platform? <a href="{% url 'register' %}">Create a formal account</a></p>
            <p class="alt-option">Alternatively: <a href="{% url 'register' %}">Request administrative credentials</a></p>
        </div>
    </div>
</div>

<style>
    :root {
        --dark-blue: #051622;     /* From the landing page buttons */
        --med-blue: #004085;      /* Professional accent blue */
        --light-blue: #eef5ff;    /* Soft background blue */
        --teal-accent: #1abc9c;   /* The "Explainable AI" teal */
        --white: #ffffff;
    }

    body {
        margin: 0;
        background-color: var(--light-blue);
        font-family: 'Inter', 'Segoe UI', sans-serif;
    }

    .auth-wrapper {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background: linear-gradient(135deg, #eef5ff 0%, #d9e8ff 100%);
    }

    .auth-container {
        width: 100%;
        max-width: 400px;
        padding: 40px;
        background: var(--white);
        border-radius: 16px;
        box-shadow: 0 10px 25px rgba(5, 22, 34, 0.08);
        border: 1px solid rgba(0, 64, 133, 0.1);
    }

    .brand-section {
        text-align: left; 
        margin-bottom: 30px;
    }

    .badge {
        display: inline-block;
        background-color: var(--teal-accent);
        color: var(--white);
        font-size: 10px;
        font-weight: 700;
        padding: 3px 10px;
        border-radius: 4px;
        letter-spacing: 0.5px;
        margin-bottom: 12px;
    }

    .brand-title {
        color: var(--dark-blue);
        font-size: 24px;
        font-weight: 800;
        margin: 0;
    }

    .divider {
        width: 40px;
        height: 4px;
        background-color: var(--teal-accent);
        margin-top: 8px;
        border-radius: 2px;
    }

    /* Form Styling */
    .form-fields p {
        margin-bottom: 20px;
    }

    .form-fields label {
        display: block;
        font-weight: 600;
        font-size: 0.9rem;
        color: var(--dark-blue);
        margin-bottom: 8px;
    }

    .form-fields input {
        width: 100%;
        padding: 12px 15px;
        border: 2px solid #e1e8f0;
        border-radius: 8px;
        font-size: 1rem;
        transition: all 0.3s ease;
        box-sizing: border-box;
    }

    .form-fields input:focus {
        outline: none;
        border-color: var(--med-blue);
        background-color: #fafcfe;
    }

    .btn-primary {
        width: 100%;
        padding: 14px;
        background-color: var(--dark-blue);
        color: var(--white);
        border: none;
        border-radius: 8px;
        font-weight: 700;
        font-size: 1rem;
        cursor: pointer;
        transition: background-color 0.2s, transform 0.1s;
    }

    .btn-primary:hover {
        background-color: #0a2a45;
        box-shadow: 0 4px 12px rgba(5, 22, 34, 0.2);
    }

    .btn-primary:active {
        transform: scale(0.98);
    }

    .auth-footer {
        margin-top: 25px;
        padding-top: 20px;
        border-top: 1px solid #eee;
        text-align: center;
    }

    .auth-footer p {
        font-size: 0.85rem;
        color: #666;
        margin: 5px 0;
    }

    .auth-footer a {
        color: var(--med-blue);
        text-decoration: none;
        font-weight: 600;
    }

    .auth-footer a:hover {
        text-decoration: underline;
    }

    .alt-option {
        opacity: 0.8;
    }
</style>
